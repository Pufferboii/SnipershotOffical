<script>
let snipershotFrame = null;
let snipershotReady = false;

function normalizeScramjetTarget(value){
  let text = String(value || "").trim();
  if(!text) return "";
  if(/^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//.test(text)) return text;
  if(text.includes(".") && !text.includes(" ")) return "https://" + text;
  return "https://search.brave.com/search?q=" + encodeURIComponent(text);
}

async function startScramjet(){
  try{
    const controller = await initBootstrap();
    await controller.wait();
    const iframe = document.createElement("iframe");
    iframe.id = "scramjetView";
    iframe.allow = "autoplay; fullscreen; pointer-lock; gamepad; clipboard-read; clipboard-write";
    iframe.setAttribute("allowfullscreen", "");
    document.body.appendChild(iframe);
    snipershotFrame = controller.createFrame(iframe);
    snipershotReady = true;
    console.log("[scramjet] connected");
  }catch(err){
    console.error("[scramjet] failed", err);
  }
}

function loadScramjetTarget(value){
  const target = normalizeScramjetTarget(value);
  if(!target) return;
  if(!snipershotReady || !snipershotFrame){
    setTimeout(() => loadScramjetTarget(target), 250);
    return;
  }
  const iframe = document.getElementById("scramjetView");
  iframe.style.display = "block";
  snipershotFrame.go(target);
}

startScramjet();
window.addEventListener("DOMContentLoaded", () => {
  const form = document.querySelector("form.search");
  const input = document.getElementById("input");
  if(form){
    form.addEventListener("submit", go);
  }
  if(input){
    input.addEventListener("keydown", event => {
      if(event.key === "Enter"){
        go(event);
      }
    });
  }
});
</script>

const sniper =
  document.getElementById("sniper");

const canvas =
  document.getElementById("fx");

const ctx =
  canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

addEventListener("resize", () => {

  canvas.width = innerWidth;
  canvas.height = innerHeight;

});

let x = 120;
let y = 120;

let vx = 0;
let vy = 0;

let dragging = false;

let facing = 1;
let targetFacing = 1;

let currentFlip = 1;

let currentAngle = 0;
let targetAngle = 0;

let bullets = [];

let ammo = 100;

let reloading = false;
let reloadVisual = 0;

let grabOffsetX = 0;
let grabOffsetY = 0;

sniper.onmousedown = e => {

  dragging = true;

  const rect =
    sniper.getBoundingClientRect();

  grabOffsetX =
    e.clientX - rect.left;

  grabOffsetY =
    e.clientY - rect.top;

  vx = 0;
  vy = 0;

  sniper.style.cursor =
    "grabbing";
};

addEventListener("mouseup", () => {

  dragging = false;

  sniper.style.cursor =
    "grab";

});

let targetX = x;
let targetY = y;

let mouseVX = 0;
let mouseVY = 0;

let lastMouseX = 0;
let lastMouseY = 0;

addEventListener("mousemove", e => {

  mouseVX =
    e.clientX - lastMouseX;

  mouseVY =
    e.clientY - lastMouseY;

  lastMouseX = e.clientX;
  lastMouseY = e.clientY;

  if(!dragging){
    return;
  }

  targetX =
    e.clientX - grabOffsetX;

  targetY =
    e.clientY - grabOffsetY;

  const grabPercent =
    grabOffsetX /
    sniper.offsetWidth;

  const leverage =
    grabPercent - 0.5;

  targetAngle =
    -(leverage * 85);

  vx += mouseVX * 0.08;
  vy += mouseVY * 0.08;

});

const keys = {};

addEventListener("keydown", e => {

  keys[e.key.toLowerCase()] = true;

  if(
    e.key.toLowerCase() === "r"
  ){
    reload();
  }

  if(
    e.key.toLowerCase() === "e"
  ){
    shoot();
  }

});

addEventListener("keyup", e => {

  keys[e.key.toLowerCase()] = false;

});

function keyboardLoop(){

  if(keys.a){

    targetFacing = -1;

    vx -= 0.22;
  }

  if(keys.d){

    targetFacing = 1;

    vx += 0.22;
  }

  if(keys.w){

    targetAngle -= 1.4;
  }

  if(keys.s){

    targetAngle += 1.4;
  }

  requestAnimationFrame(
    keyboardLoop
  );
}

keyboardLoop();

function reload(){

  if(reloading){
    return;
  }

  reloading = true;

  let spin = 0;

  const reloadAnim = setInterval(() => {

    spin += 10;

    reloadVisual = spin;

  },16);

  setTimeout(() => {

    clearInterval(reloadAnim);

    reloadVisual = 0;
    ammo = 10;

    reloading = false;

  },900);
}

function shoot(){

  if(reloading){
    return;
  }

  if(ammo <= 0){
    reload();
    return;
  }

  ammo--;

  const radians =
    currentAngle *
    Math.PI / 180;

  const speed = 12;

  const muzzleX =
    x +
    (facing === 1 ? 315 : 95) +
    Math.cos(radians) *
    120 *
    facing;

  const muzzleY =
    y +
    90 +
    Math.sin(radians) * 120;

  bullets.push({

    x:muzzleX,
    y:muzzleY,

    vx:
      Math.cos(radians) *
      speed *
      facing,

    vy:
      Math.sin(radians) *
      speed,

    life:0

  });
}

function update(){

  if(dragging){

    x +=
      (targetX - x) * 0.22;

    y +=
      (targetY - y) * 0.22;

  }else{

    vy += 0.42;

    x += vx;
    y += vy;

    vx *= 0.985;
    vy *= 0.985;
  }

  const leverage =
    (grabOffsetX /
    sniper.offsetWidth) - 0.5;

  if(dragging){
    targetAngle -=
      leverage * 1.4;
  }

 const floor =
  innerHeight - sniper.offsetHeight;

  if(y > floor){

    y = floor;

    vy *= -0.22;

    vx *= 0.96;

    if(Math.abs(vy) < 0.25){
      vy = 0;
    }
  }

if(x < 0){

  x = 0;
  vx *= -0.35;

}

if(
  x >
  innerWidth - sniper.offsetWidth
){

  x =
    innerWidth - sniper.offsetWidth;

  vx *= -0.35;

}

  currentFlip +=
    (targetFacing - currentFlip) *
    0.12;

  currentAngle +=
    (targetAngle - currentAngle) *
    0.12;

  sniper.style.left =
    x + "px";

  sniper.style.top =
    y + "px";

sniper.style.transform =
  "scaleX(" + currentFlip + ") rotate(" + (currentAngle + reloadVisual) + "deg)";

  requestAnimationFrame(update);
}

update();

function bulletDraw(x, y, angle){

  ctx.save();

  ctx.translate(x, y);

  ctx.rotate(angle);

  ctx.fillStyle = "#d4b06a";

  ctx.fillRect(-6, -1, 12, 3);

  ctx.fillStyle = "#f7e4a8";

  ctx.fillRect(4, -1, 4, 3);

  ctx.restore();
}

function render(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  for(
    let i = bullets.length - 1;
    i >= 0;
    i--
  ){

    const bullet =
      bullets[i];

    bullet.life++;

    bullet.x += bullet.vx;
    bullet.y += bullet.vy;

    bulletDraw(
      bullet.x,
      bullet.y,
      Math.atan2(
        bullet.vy,
        bullet.vx
      )
    );

    if(
      bullet.life > 220 ||
      bullet.x < -200 ||
      bullet.x > innerWidth + 200 ||
      bullet.y < -200 ||
      bullet.y > innerHeight + 200
    ){
      bullets.splice(i,1);
    }
  }

  requestAnimationFrame(render);
}

render();

</script>

</body>
</html>
